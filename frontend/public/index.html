<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Multi-tenant chatbot platform" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>Bot Console</title>

        <style>
            [class*="emergent"],[id*="emergent"],[data-emergent],
            iframe[src*="emergentagent"],a[href*="emergentagent"] {
                display: none !important;
            }
        </style>
        <script>
            (function () {
                /* ── 1. Lock the page title ── */
                var TITLE = "Bot Console";
                document.title = TITLE;
                var _titleDesc = Object.getOwnPropertyDescriptor(Document.prototype, "title");
                Object.defineProperty(document, "title", {
                    get: function () { return TITLE; },
                    set: function (v) {
                        if (v && !v.toLowerCase().includes("emergent")) { TITLE = v; }
                        _titleDesc.set.call(document, TITLE);
                    },
                    configurable: true,
                });

                /* ── 2. Strip Emergent badge nodes as soon as they appear ── */
                function strAttr(v) { return typeof v === "string" ? v : ""; }
                function isEmergentNode(node) {
                    if (node.nodeType !== 1) return false;
                    var tag  = strAttr(node.tagName).toLowerCase();
                    var cls  = strAttr(node.getAttribute && node.getAttribute("class")).toLowerCase();
                    var id   = strAttr(node.id).toLowerCase();
                    var src  = strAttr(node.getAttribute && (node.getAttribute("src") || node.getAttribute("href"))).toLowerCase();
                    var text = strAttr(node.textContent).toLowerCase();
                    return (
                        cls.includes("emergent") ||
                        id.includes("emergent")  ||
                        src.includes("emergentagent") ||
                        (tag === "iframe" && src.includes("emergent")) ||
                        text.includes("made with emergent") ||
                        text.includes("built with emergent")
                    );
                }

                function purge(node) {
                    if (isEmergentNode(node)) { node.remove(); return; }
                    node.querySelectorAll &&
                        node.querySelectorAll(
                            '[class*="emergent"],[id*="emergent"],iframe[src*="emergent"],a[href*="emergentagent"]'
                        ).forEach(function (el) { el.remove(); });
                }

                var observer = new MutationObserver(function (mutations) {
                    mutations.forEach(function (m) {
                        m.addedNodes.forEach(purge);
                    });
                });

                /* Start observing as early as possible; re-observe after DOMContentLoaded */
                observer.observe(document.documentElement, { childList: true, subtree: true });
                document.addEventListener("DOMContentLoaded", function () {
                    purge(document.body);   /* sweep anything already rendered */
                });
            })();
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>

      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    </body>
</html>
