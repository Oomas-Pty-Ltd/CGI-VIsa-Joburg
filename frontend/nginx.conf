server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match the backend's 50 MB large-upload support.
    client_max_body_size 50M;

    # ---- Exclude the demo / dev harness from production ----------------
    # The /widget-demo SPA route and these demo HTML pages are dev tooling.
    # NOTE: this blocks DIRECT loads of these paths. The /widget-demo route
    # still exists inside the JS bundle (reachable via client-side nav). To
    # remove it entirely, guard the route in frontend/src/App.js behind an
    # env flag and rebuild.
    location = /widget-demo                     { return 404; }
    location = /chatbot-widget.html             { return 404; }
    location = /seva-setu-chatbot-widget.html   { return 404; }
    location = /TECHNICAL_DOCS.md               { return 404; }

    # ---- The REAL embeddable widget must stay reachable, cross-origin ----
    # Customers load this <script src> from their own sites.
    location = /seva-widget.js {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # ---- API -> backend container ----------------------------------------
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 50M;
    }

    # ---- Hashed static assets: cache hard --------------------------------
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ---- SPA fallback ----------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
