name: Build & Deploy

# Build backend + frontend images, push to GHCR, then SSH to the VM and pull.
# The heavy build (spaCy model) runs here, not on the VM.

on:
  push:
    branches: [v_staging]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_BASE: ghcr.io/mobimerz/cgi-visa-joburg   # GHCR names must be lowercase

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to GHCR via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-backend:latest
            ${{ env.IMAGE_BASE }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          # Baked into the SPA + widget at build time. Set the repo variable
          # PUBLIC_API_URL (empty = same-origin; https://domain for prod widget).
          build-args: |
            REACT_APP_BACKEND_URL=${{ vars.PUBLIC_API_URL }}
          tags: |
            ${{ env.IMAGE_BASE }}-frontend:latest
            ${{ env.IMAGE_BASE }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: v_staging      # reads env-scoped secrets + any protection rules
    steps:
      - uses: actions/checkout@v4

      - name: Ship compose file + pull/restart on the VM
        env:
          SSH_KEY: ${{ secrets.VM_SSH_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          OWNER: ${{ github.repository_owner }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Sync just the compose file (images come from GHCR; no source build on the VM).
          scp -i ~/.ssh/id_deploy docker-compose.yml "$VM_USER@$VM_HOST:$DEPLOY_PATH/docker-compose.yml"

          ssh -i ~/.ssh/id_deploy "$VM_USER@$VM_HOST" \
            DEPLOY_PATH="$DEPLOY_PATH" IMAGE_BASE="$IMAGE_BASE" SHA="$SHA" \
            OWNER="$OWNER" GHCR_PAT="$GHCR_PAT" 'bash -se' <<'REMOTE'
              set -euo pipefail
              cd "$DEPLOY_PATH"
              echo "$GHCR_PAT" | docker login ghcr.io -u "$OWNER" --password-stdin
              export BACKEND_IMAGE="$IMAGE_BASE-backend:$SHA"
              export FRONTEND_IMAGE="$IMAGE_BASE-frontend:$SHA"
              docker compose pull backend frontend
              docker compose up -d --no-build backend frontend
              docker image prune -f
          REMOTE
